<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
            margin: 60px auto 0 auto;
        }

        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .categoria-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            margin: 20px 0;
            font-weight: bold;
        }

        .puntaje {
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .respuesta-correcta {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            color: #333;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 30px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<!-- Contenido -->
<div class="main-content">
    <div class="container">
        <div class="emoji" th:if="${acierto}">🎉</div>
        <div class="emoji" th:unless="${acierto}">❌</div>

        <h1 th:if="${acierto}">¡CORRECTO!</h1>
        <h1 th:unless="${acierto}">INCORRECTO</h1>

        <div class="categoria-badge" th:text="${categoria.nombre}"></div>

        <div class="puntaje" th:text="'Puntaje: ' + ${puntaje}"></div>

        <div th:if="${!acierto}" class="respuesta-correcta">
            <p style="margin-bottom: 10px;">Respuesta correcta:</p>
            <p style="font-weight: bold; font-size: 1.1em;" th:text="${respuestaCorrecta}"></p>
        </div>

        <!-- ← BOTONES SIMPLIFICADOS -->
        <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center;">

            <!-- Si NO es última pregunta -->
            <th:block th:if="${!esUltimaPregunta}">
                <a href="/categoria" style="
        padding: 12px 30px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
    ">
                    SIGUIENTE PREGUNTA →
                </a>
            </th:block>

            <!-- Si ES última pregunta -->
            <th:block th:if="${esUltimaPregunta}">
                <a href="/categoria" style="
        padding: 12px 30px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
    ">
                    SIGUIENTE CATEGORÍA →
                </a>
            </th:block>
    </div>
</div>

<!-- Footer -->
<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
