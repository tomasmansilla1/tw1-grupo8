<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .estadisticas {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        .stat {
            margin-bottom: 15px;
            color: #333;
        }

        .stat-valor {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .porcentaje {
            color: #667eea;
            font-weight: bold;
        }

        a {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="emoji" th:if="${porcentaje} >= 80">🎉</div>
    <div class="emoji" th:if="${porcentaje} >= 60 and ${porcentaje} < 80">👍</div>
    <div class="emoji" th:if="${porcentaje} < 60">📚</div>

    <h1>¡Juego Finalizado!</h1>

    <div class="estadisticas">
        <div class="stat">
            <div class="stat-label">Tu Puntaje</div>
            <div class="stat-valor" th:text="${puntajeFinal} + ' de ' + ${totalPreguntas}"></div>
        </div>
        <div class="stat">
            <div class="stat-label">Porcentaje</div>
            <div class="stat-valor porcentaje" th:text="${porcentaje} + '%'"></div>
        </div>
    </div>

    <a href="juego.html">Jugar de Nuevo</a>
</div>
</body>
</html>
