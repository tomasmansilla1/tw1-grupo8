<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background: linear-gradient(135deg, #2B7DBF, #1f5f94);">

    <div class="container">

        <a class="navbar-brand fw-bold" th:href="@{/home}">
            Trivia Game
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">
                        Inicio
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buscar-juego}">
                        Jugar
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/ranking}">
                        Ranking
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/usuario/historial}">
                        Historial
                    </a>
                </li>

                <li class="nav-item"
                    th:if="${session.usuario != null and session.usuario.rol == 'ADMIN'}">

                    <a class="nav-link text-warning fw-bold"
                       th:href="@{/admin}">
                        Panel Admin
                    </a>
                </li>

                <li class="nav-item ms-2">
                    <a th:if="${session.usuario == null}"
                       class="btn btn-outline-light btn-sm px-3"
                       th:href="@{/login}">
                        Iniciar sesión
                    </a>

                    <a th:if="${session.usuario != null}"
                       class="btn btn-danger btn-sm px-3"
                       th:href="@{/logout}">
                        Salir
                    </a>
                </li>
            </ul>
            
        </div>
    </div>
</nav>

</body>
</html>
