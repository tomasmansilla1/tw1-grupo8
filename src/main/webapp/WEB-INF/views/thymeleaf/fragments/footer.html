<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<footer th:fragment="footer" class="footer">
    <div class="footer-container">
        <div class="footer-content">
            <div class="footer-section">
                <h4>Sobre Preguntados</h4>
                <p>Un juego de preguntas interactivo con categorías de OpenTDB API.</p>
            </div>

            <div class="footer-section">
                <h4>Navegación</h4>
                <ul>
                    <li><a href="/">Inicio</a></li>
                    <li><a href="/categoria">Jugar</a></li>
                </ul>
            </div>

            <div class="footer-section">
                <h4>Contacto</h4>
                <p>📧 Email: info@preguntados.com</p>
                <p>🌐 Web: www.preguntados.com</p>
            </div>
        </div>

        <div class="footer-bottom">
            <p>&copy; 2024 Preguntados. Todos los derechos reservados.</p>
            <p>Preguntas de <a href="https://opentdb.com/" target="_blank">OpenTDB API</a></p>
        </div>
    </div>

    <style>
        .footer {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 40px 20px 20px;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            margin-bottom: 30px;
        }

        .footer-section h4 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .footer-section p {
            line-height: 1.6;
            font-size: 0.95em;
            margin-bottom: 10px;
        }

        .footer-section ul {
            list-style: none;
            padding: 0;
        }

        .footer-section ul li {
            margin-bottom: 8px;
        }

        .footer-section ul li a {
            color: #ecf0f1;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-section ul li a:hover {
            color: #667eea;
        }

        .footer-section a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-section a:hover {
            color: #ecf0f1;
            text-decoration: underline;
        }

        .footer-bottom {
            border-top: 1px solid #34495e;
            padding-top: 20px;
            text-align: center;
            font-size: 0.9em;
            color: #95a5a6;
        }

        .footer-bottom p {
            margin: 5px 0;
        }

        @media (max-width: 600px) {
            .footer {
                padding: 30px 15px 15px;
            }

            .footer-content {
                gap: 20px;
            }

            .footer-section h4 {
                font-size: 1em;
                margin-bottom: 10px;
            }

            .footer-section p {
                font-size: 0.9em;
            }
        }
    </style>
</footer>
</body>
</html>
