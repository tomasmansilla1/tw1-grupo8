<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregunta - Trivia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">

<style>
.quiz-form {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.option-container input[type="radio"] {
    display: none;
}

.option-label {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    border-radius: 16px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .25s ease;
    user-select: none;
}

.option-label::before {
    content: attr(data-letter);

    display: inline-flex;
    justify-content: center;
    align-items: center;

    min-width: 34px;
    height: 34px;

    margin-right: 15px;

    border-radius: 50%;

    background: rgba(0,0,0,.08);

    font-weight: bold;
}

.option-container input[type="radio"]:checked + .option-label::before {
    background: rgba(255,255,255,.25);
}

.stats-box strong {
    display: block;
    color: #4DA3D9;
    margin-bottom: 5px;
}

.question-header {
    margin: 30px 0;
    text-align: center;
}

.question-header h2 {
    line-height: 1.5;
}

.quiz-footer {
    text-align: center;
    color: #4DA3D9;
    font-size: .9rem;
}

body.home-body {
    background: linear-gradient(
        -45deg,
        #FFE3EA,
        #A9D9FF,
        #D5F4E6,
        #FFF1B8
    );
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    min-height: 100vh;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.game-card {
    max-width: 800px;
    margin: auto;

    background: rgba(255,255,255,.95);
    backdrop-filter: blur(10px);

    border-radius: 25px;

    padding: 35px;

    box-shadow:
        0 15px 40px rgba(0,0,0,.15),
        0 0 25px rgba(77,163,217,.15);
}

.stats-box {
    background: white;
    border-radius: 15px;
    padding: 15px;

    box-shadow:
        0 5px 15px rgba(0,0,0,.08);
}

.badge-cat {
    background: #4DA3D9;
    padding: 10px 18px;
    border-radius: 25px;
    color: white;
    display: inline-block;
}

.question-header h2 {
    color: #4DA3D9;
    font-size: 1.8rem;
    font-weight: 800;
}

.option-container input[type="radio"]:checked + .option-label {
    background:
        linear-gradient(
            135deg,
            #4DA3D9,
            #7B61FF
        );
    border-color: transparent;
    color: white;
}

.option-label:hover {
    border-color: #4DA3D9;
    transform: translateY(-3px);
    box-shadow:
        0 8px 20px rgba(77,163,217,.15);
}

.option-label {
    background: white;
    border: 2px solid #A9D9FF;
}

.btn-submit {
    width: 100%;
    padding: 16px;

    border: none;
    border-radius: 50px;

    font-size: 1.1rem;
    font-weight: bold;

    color: white;
    background:
        linear-gradient(
            135deg,
            #4DA3D9,
            #7B61FF
        );

    box-shadow:
        0 10px 25px rgba(123,97,255,.35);

    transition: .3s ease;
}

.btn-submit:hover {
    transform:
        translateY(-3px)
        scale(1.02);

    box-shadow:
        0 15px 35px rgba(123,97,255,.45);
}

.progress {
    height: 28px;
    border-radius: 20px;
    overflow: hidden;
}
.progress-bar {
    background:
        linear-gradient(
            135deg,
            #4DA3D9,
            #7B61FF
        );

    font-weight: bold;
}

.alert-success {
    border-radius: 15px;
}

.alert-danger {
    border-radius: 15px;
}
</style>

</head>

<body class="home-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-5">
<div class="game-card">

    <div class="row text-center mb-4">

        <div class="col-md-3 mb-3">
            <div class="stats-box">
                <strong>Pregunta</strong>
                <span th:text="${session.indiceActual + 1}"></span>
                    de
                <span th:text="${cantidadPreguntas}"></span>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="stats-box">
                <strong>Categoría</strong><br>
                <span class="badge-cat" th:text="${categoriaActual}"></span>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="stats-box">
                <strong>Puntaje</strong><br>
                <span th:text="${puntaje != null ? puntaje : 0}"></span>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="stats-box">
                <strong>Racha</strong><br>
                <span th:text="${racha != null ? racha : 0}"></span>
            </div>
        </div>
    </div>

    <div class="progress mb-4" style="height:25px;">
        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
        th:style="'width:' + ((session.indiceActual + 1) * 100 / cantidadPreguntas) + '%'">

            <span th:text="${(session.indiceActual + 1) * 100 / cantidadPreguntas} + '%'"></span>
        </div>
    </div>

    <div class="question-header">
        <h2 th:text="${pregunta.consigna}">Pregunta</h2>
    </div>

    <form th:action="@{/responder}" method="post" class="quiz-form">

        <label class="option-container">
            <input type="radio" name="respuesta" value="A" required>
            <span class="option-label" data-letter="A" th:text="${pregunta.opcionA}">Opción A de muestra</span>
        </label>

        <label class="option-container">
            <input type="radio" name="respuesta" value="B" required>
            <span class="option-label" data-letter="B" th:text="${pregunta.opcionB}">Opción B de muestra</span>
        </label>

        <label class="option-container">
            <input type="radio" name="respuesta" value="C" required>
            <span class="option-label" data-letter="C" th:text="${pregunta.opcionC}">Opción C de muestra</span>
        </label>

        <label class="option-container">
            <input type="radio" name="respuesta" value="D" required>
            <span class="option-label" data-letter="D" th:text="${pregunta.opcionD}">Opción D de muestra</span>
        </label>

        <button type="submit" class="btn-submit">Responder</button>

        <div class="mt-3">
            <div
                th:if="${session.ultimaRespuestaCorrecta != null and session.ultimaRespuestaCorrecta}"
                class="alert alert-success">
                ¡Respuesta correcta!
            </div>
            <div
                th:if="${session.ultimaRespuestaCorrecta != null and !session.ultimaRespuestaCorrecta}"
                class="alert alert-danger">
                Respuesta incorrecta
            </div>
        </div>

    </form>
</div>

    <footer class="quiz-footer mt-4">
        <div class="container small">
            &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
        </div>
    </footer>
</main>

</body>
</html>
