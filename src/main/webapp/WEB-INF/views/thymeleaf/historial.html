<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5">

    <div class="quiz-card">

        <div class="text-center mb-4">
            <h1 class="title">Historial de Partidas</h1>
            <div class="divider"></div>
        </div>

            <div class="divider"></div>
                <p class="subtitle">
                    Consultá todas tus partidas jugadas y sus resultados.
                </p>
            </div>

            <div th:if="${#lists.isEmpty(partidas)}"
            class="alert alert-light text-center">
                No jugaste ninguna partida todavía.
            </div>

            <div th:unless="${#lists.isEmpty(partidas)}" class="table-responsive">

                <table class="table align-middle">
                    
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Puntaje</th>
                            <th>Resultado</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="partida : ${partidas}">
                            <td th:text="${partida.fecha}">
                                01/01/2026
                            </td>

                            <td>
                            <span class="fw-bold"
                                th:text="${partida.puntajeObtenido}">0</span>
                            </td>

                            <td>
                                <span th:if="${partida.esVictoria}"
                                class="badge bg-success">
                                    Victoria
                                </span>

                                <span th:unless="${partida.esVictoria}"
                                class="badge bg-danger">
                                    Derrota
                                </span>

                            </td>

                        </tr>

                    </tbody>
                </table>

            </div>

        <a th:href="@{/home}" class="btn-quiz mt-4">
            Volver al inicio
        </a>
    </div>
</main>

    <footer class="quiz-footer mt-4">
        <div class="container small">
            &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
        </div>
    </footer>
</body>
</html>
