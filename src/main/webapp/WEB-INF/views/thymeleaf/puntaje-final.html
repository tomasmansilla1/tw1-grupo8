<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado - Trivia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container my-5">
        <div class="quiz-card text-center">

            <div style="font-size: 80px;">🏆</div>
            <h1 class="title">¡Partida Terminada!</h1>

            <div class="divider"></div>

            <p class="subtitle">Tu puntaje final es:</p>
            <h2 class="display-2 fw-bold text-primary" th:text="${puntaje}">0</h2>

            <div class="row mt-4 text-center">
                <div class="col">
                    <h4 th:text="${puntaje}">0</h4>
                    <small>Puntaje</small>
                </div>

                <div class="col">
                    <h4 th:text="${aciertos}">0</h4>
                    <small>Aciertos</small>
                </div>

                <div class="col">
                    <h4 th:text="${racha}">0</h4>
                    <small>Mejor racha</small>
                </div>
            </div>

            <div class="mt-4">
                <a th:href="@{/buscar-juego}"class="btn-quiz">
                    Jugar nuevamente
                </a>
            </div>

            <div class="mt-3">
                <a th:href="@{/home}"class="btn-quiz">
                    Volver al menú
                </a>
            </div>

        </div>
    </main>

    <footer class="quiz-footer mt-4">
        <div class="container small">
            &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
        </div>
    </footer>

</body>
</html>
