<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado - Trivia</title>
    <style>
        /* Reset básico y tipografía */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fondo degradado idéntico al login */
        body {
            background: linear-gradient(135deg, #cbd3da 0%, #a1b4c4 50%, #8ca4b9 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Tarjeta de resultados */
        .result-card {
            background-color: rgba(220, 224, 227, 0.95);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: popIn 0.5s ease-out; /* Animación sutil de entrada */
        }

        /* Animación de aparición */
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Título principal */
        .result-card h1 {
            color: #3b7da3;
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* Subrayado rosa del título */
        .title-underline {
            width: 60px;
            height: 4px;
            background-color: #c07a8a;
            margin: 8px auto 25px auto;
            border-radius: 2px;
        }

        /* Contenedor del Trofeo Animado */
        .trophy-icon {
            font-size: 4.5rem;
            margin-bottom: 15px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Texto secundario */
        .result-card p {
            color: #556775;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        /* Estilizado del puntaje grandote */
        .score-display {
            color: #2b5c7a;
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 35px;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.5);
        }

        /* Botón Volver a Jugar (Estilo bordeado del botón 'Crear cuenta' del login) */
        .btn-secondary {
            display: inline-block;
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            font-weight: bold;
            color: #3b7da3;
            background-color: transparent;
            border: 1.5px solid #3b7da3;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background-color: rgba(59, 125, 163, 0.1);
            border-color: #2b5c7a;
            color: #2b5c7a;
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="result-card">
    <h1>¡Partida Terminada!</h1>
    <div class="title-underline"></div>

    <!-- Efecto visual de juego -->
    <div class="trophy-icon">🏆</div>

    <p>Tu puntaje final es:</p>

    <!-- Aquí se renderiza tu puntaje de Thymeleaf -->
    <h2 class="score-display" th:text="${puntaje}">150</h2>

    <!-- Botón de acción para reiniciar el flujo (Estilo 'Crear Cuenta') -->
    <a th:href="@{/}" class="btn-secondary">Volver al Inicio</a>
</div>

</body>
</html>
