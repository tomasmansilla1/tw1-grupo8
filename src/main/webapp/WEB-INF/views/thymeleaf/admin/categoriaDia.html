<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title> Categoria del Día </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"> </div>

    <div class="container mt-4">
        <h1> Categoría del Día </h1>

        <!-- error -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"> </span>
        </div>

        <!-- mensaje ok -->
        <div th:if="${ok}" class="alert alert-success">
            <span th:text="${ok}"> </span>
        </div>

        <!-- formulario -->
        <form th:action="@{/admin/categoriaDia}"  method="post">
            <div class="mb-3">

                <label class="form-label"> Seleccionar categoría </label>
                <select name="categoria" class="form-control" required>

                    <option value=""> Seleccionar </option>
                    <!-- categorías -->
                    <option value="Entretenimiento"> Entretenimiento </option>
                    <option value="Ciencia"> Ciencia </option>
                    <option value="Cultura"> Cultura general </option>
                    <option value="Deportes"> Deportes </option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary"> Guardar </button>
        </form>
    </div>

    <!-- footer -->
    <div th:replace="~{fragments/footer :: footer}"> </div>

</body>
</html>
