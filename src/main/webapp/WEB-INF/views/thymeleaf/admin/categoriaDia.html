<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Categoría del Día</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-5">

    <div class="text-center mb-4">
        <h1 class="title">Categoría del Día</h1>
        <div class="divider"></div>
        <p class="subtitle">
            Seleccioná la categoría que se jugará hoy
        </p>
    </div>

    <div class="quiz-card mb-4 text-center">
        <h5 class="title">Categoría activa hoy</h5>
        <p class="subtitle">
            <span th:text="${categoriaDia}">Sin categoría</span>
        </p>
    </div>

    <div class="quiz-card narrow mx-auto">

        <!-- ERROR -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <!-- OK -->
        <div th:if="${ok}" class="alert alert-success">
            <span th:text="${ok}"></span>
        </div>

        <!-- FORM -->
        <form th:action="@{/admin/categoriaDia}" method="post">

            <label class="subtitle">Categoría</label>

            <select name="categoria" class="form-control mt-2" required>

                <option value="" disabled selected>Seleccionar</option>

                <option value="Entretenimiento">Entretenimiento</option>
                <option value="Ciencia">Ciencia</option>
                <option value="Cultura">Cultura general</option>
                <option value="Deportes">Deportes</option>

            </select>

            <!-- botones -->
            <div class="d-flex gap-2 justify-content-end mt-4">

                <a th:href="@{/admin}" class="btn-quiz" style="width:auto;">
                    Cancelar
                </a>

                <button type="submit" class="btn-quiz" style="width:auto;">
                    Guardar
                </button>

            </div>
        </form>
        <div class="quiz-card mt-4">
            <h5 class="title">Historial de categorías</h5>
            <ul class="text-start">
                <li th:each="c : ${historial}">
                    <b th:text="${c.nombre}"></b>
                    <span class="text-muted"> - </span>
                    <span th:text="${c.fecha}"></span>
                </li>
            </ul>
        </div>

    </div>
</main>

<footer class="quiz-footer mt-4">
    <div class="container small">
        &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
    </div>
</footer>

</body>
</html>
