<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Categoría del Día</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-5">

    <div class="text-center mb-4">
        <h1 class="title">Categoría del Día</h1>
        <div class="divider"></div>
        <p class="subtitle">
            Seleccioná la categoría que se jugará hoy
        </p>
    </div>

    <div class="quiz-card mb-4 text-center">
        <h5 class="title">Categoría activa hoy</h5>
        <p class="subtitle">
            <span th:text="${categoriaDia}">Sin categoría</span>
        </p>
    </div>

    <div class="quiz-card narrow mx-auto">

        <div th:if="${error}" class="alert alert-danger mb-3">
            <span th:text="${error}"></span>
        </div>
        <div th:if="${ok}" class="alert alert-success mb-3">
            <span th:text="${ok}"></span>
        </div>

        <!-- FORM -->
        <form th:action="@{/admin/guardarCategoriaDia}" method="post">

            <label class="subtitle">Categoría</label>

            <select name="categoria" class="form-control mt-2" required>

                <option value="" disabled selected>Seleccionar</option>

                <option value="Entretenimiento">Entretenimiento</option>
                <option value="Ciencia">Ciencia</option>
                <option value="Cultura">Cultura general</option>
                <option value="Deportes">Deportes</option>

            </select>

            <!-- botones -->
            <div class="d-flex gap-2 justify-content-end mt-4">

                <a th:href="@{/admin}" class="btn-quiz" style="width:auto;">
                    Cancelar
                </a>

                <button type="submit" class="btn-quiz" style="width:auto;">
                    Guardar
                </button>

            </div>
        </form>

        <h3 class="mt-4"> Historial de categorías </h3>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Categoría</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${historial}">
                    <td th:text="${item.nombre}"></td>
                    <td th:text="${item.fecha}"></td>
                </tr>
            </tbody>
        </table>

    </div>
</main>

<footer class="quiz-footer mt-4">
    <div class="container small">
        &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
    </div>
</footer>

</body>
</html>
