<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title> Categoria del Día </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"> </div>

    <div class="container mt-5 mb-5">

        <div class="col-md-6 mx-auto mb-4 pb-2 border-bottom">
            <h1 class="text-dark fw-bold m-0">Categoría del Día</h1>
            <p class="text-muted small mb-0">
                Selecciona la categoria que se jugara durante el dia
            </p>
        </div>

        <div class="row">
            <div class="col-md-6 mx-auto">
                <!-- error -->
                <div th:if="${error}" class="alert alert-danger alert-dismissible 
                fade show shadow-sm border-0 py-3 mb-3" role="alert">
                    <span th:text="${error}" class="fw-semibold"> </span>
                </div>

            <!-- mensaje ok -->
            <div th:if="${ok}" class="alert alert-success alert-dismissible 
            fade show shadow-sm border-0 py-3 mb-3" role="alert">
                <span th:text="${ok}" class="fw-semibold"> </span>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">

                    <!-- formulario -->
                    <form th:action="@{/admin/categoriaDia}"  method="post">
                        <div class="mb-4">

                            <label class="form-label fw-semibold text-secondary"> Seleccionar categoría </label>
                            <select name="categoria" class="form-select form-select-lg shadow-sm fw-medium" required>

                                <option value="" disabled selected> Seleccionar </option>
                                <!-- categorías -->
                                <option value="Entretenimiento"> Entretenimiento </option>
                                <option value="Ciencia"> Ciencia </option>
                                <option value="Cultura"> Cultura general </option>
                                <option value="Deportes"> Deportes </option>
                            </select>
                        </div>

                        <div class="d-flex gap-2 justify-content-end pt-2">
                            <a th:href="@{/admin}" 
                            class="btn btn-outline-secondary px-4 fw-medium">
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-info text-white px-4 fw-medium shadow-sm">
                                Guardar Configuración
                            </button>
                        </div>

                    </form>
                </div>
            </div>
            
        </div>
    </div>
</div>

    <!-- footer -->
    <footer class="bg-white border-top py-3 text-center text-muted mt-auto">
        <div class="container small">
            &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
        </div>
    </footer>

</body>
</html>
