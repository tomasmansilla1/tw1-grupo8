<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Preguntas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"> </div>

    <div class="container mt-4">
        <h1> Preguntas </h1>

        <!-- mensaje éxito -->
        <div th:if="${ok}" class="alert alert-success">
            <span th:text="${ok}"> </span>
        </div>

        <!-- mensaje error -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"> </span>
        </div>

        <table class="table table-bordered mt-3">
            <thead>
                <tr>
                    <th> ID </th>
                    <th> Pregunta </th>
                    <th> Categoría </th>
                    <th> Acciones </th>
                </tr>
            </thead>

            <tbody>
                <!-- foreach -->
                <tr th:each="p : ${preguntas}">
                    <td th:text="${p.id}"> </td>
                    <td th:text="${p.pregunta}"> </td>
                    <td th:text="${p.categoria}"> </td>

                    <td>
                        <!-- editar -->
                        <a class="btn btn-warning btn-sm"
                        th:href="@{/admin/editarPregunta(id=${p.id})}">
                            Editar
                        </a>

                        <!-- eliminar -->
                        <a class="btn btn-danger btn-sm"
                        onclick="return confirm('¿Eliminar pregunta?')"
                        th:href="@{/admin/eliminarPregunta(id=${p.id})}">
                            Eliminar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
