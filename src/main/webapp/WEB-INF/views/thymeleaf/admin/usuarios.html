<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Administrar Usuarios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container my-5">

        <div class="text-center mb-4">
            <h1 class="title">Administrar Usuarios</h1>
            <div class="divider"></div>
        </div>

        <div class="quiz-card">

            <table class="table table-hover align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Email</th>
                        <th>Advertencias</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="6" class="text-center text-muted">
                            No hay usuarios registrados.
                        </td>
                    </tr>

                    <tr th:each="usuario : ${usuarios}">

                        <td th:text="${usuario.id}"></td>
                        <td th:text="${usuario.username}"></td>
                        <td th:text="${usuario.email}"></td>
                        <td th:text="${usuario.advertencias}"></td>

                        <td>
                            <span class="badge bg-success" th:if="${!usuario.baneado}">
                                Activo
                            </span>

                            <span class="badge bg-danger" th:if="${usuario.baneado}">
                                Baneado
                            </span>
                        </td>

                        <td>
                            <div class="d-flex flex-wrap gap-1">

                                <form th:action="@{/admin/advertir/{id}(id=${usuario.id})}" method="post">

                                    <button class="btn btn-warning btn-sm text-white">
                                        Advertir
                                    </button>
                                </form>

                                <form th:action="@{/admin/ban1/{id}(id=${usuario.id})}" method="post">

                                    <button class="btn btn-secondary btn-sm">
                                        1 día
                                    </button>
                                </form>

                                <form th:action="@{/admin/ban7/{id}(id=${usuario.id})}" method="post">

                                    <button class="btn btn-secondary btn-sm">
                                        7 días
                                    </button>
                                </form>

                                <form th:action="@{/admin/banpermanente/{id}(id=${usuario.id})}" method="post">

                                    <button class="btn btn-danger btn-sm"
                                            onclick="return confirm('¿Banear permanentemente este usuario?')">
                                        Permanente
                                    </button>
                                </form>

                                <form th:action="@{/admin/desban/{id}(id=${usuario.id})}" method="post">

                                    <button class="btn btn-success btn-sm">
                                        Desbanear
                                    </button>
                                </form>

                            </div>

                        </td>
                    </tr>

                </tbody>
            </table>

        </div>

        <div class="mt-4">

            <a th:href="@{/admin}" class="btn-quiz">
                Volver al panel
            </a>
            
        </div>

    </main>

    <footer class="quiz-footer mt-4">
        <div class="container small">
            &copy; 2026 - Taller Web I - Universidad Nacional de La Matanza
        </div>
    </footer>

</body>

</html>
