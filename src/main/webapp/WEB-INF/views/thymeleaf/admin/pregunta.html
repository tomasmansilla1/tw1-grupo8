<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Listado de Preguntas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"> </div>

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <h1 class="text-dark fw-bold m-0"> Listado de Preguntas </h1>

            <a th:href="@{/admin/crearPregunta}" class="btn btn-success shadow-smfw-semibold">
                <i class="bi bi-plus-lg"></i> Nueva Pregunta
            </a>
        </div>

        <!-- mensaje éxito -->
        <div th:if="${ok}" class="alert alert-success 
        alert-dismissible fade show shadow-sm" role="alert">
            <span th:text="${ok}"> </span>
        </div>

        <!-- mensaje error -->
        <div th:if="${error}" class="alert alert-danger 
        alert-dismissible fade show shadow-sm" role="alert">
            <span th:text="${error}"> </span>
        </div>

        <div class="card shadow-sm border-0 overflow-hidden mt-3">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">

                    <thead class="table-dark text-uppercase fs-7" 
                    style="font-size: 0.85rem; letter-spacing: 0.5px;">
                        <tr>
                            <th class="ps-4 py-3" style="width: 10%"> ID </th>
                            <th class="py-3" style="width: 50%"> Pregunta </th>
                            <th class="py-3" style="width: 20%"> Categoría </th>
                            <th class="text-center py-3 pe-4" style="width: 20%"> Acciones </th>
                        </tr>
                    </thead>

                    <tbody>
                        <!-- si no hay preguntas -->
                        <tr th:if="${#lists.isEmpty(preguntas)}">
                            <td colspan="4" class="text-center text-muted py-4">
                                No hay preguntas registradas
                            </td>
                        </tr>
                        <!-- foreach -->
                        <tr th:each="p : ${pregunta}">
                            <td th:text="${p.id}" class="ps-4 fw-bold text-secondary"> </td>
                            <td th:text="${p.pregunta}" class="text-dark fw-medium"> </td>
                            <td>
                                <span class="badge bg-info bg-opacity-10 text-info px-3 py-2 
                                    rounded-pill fw-semibold text-capitalize" 
                                    th:text="${p.categoria}">
                                </span>
                            </td>

                            <td class="text-center pe-4">
                                <!-- editar -->
                                <div class="d-inline-flex gap-2">
                                    <a class="btn btn-warning btn-sm px-3 fw-medium text-white shadow-sm"
                                        th:href="@{/admin/editarPregunta(id=${p.id})}">
                                        Editar
                                    </a>

                                    <!-- eliminar -->
                                    <form th:action="@{/admin/eliminarPregunta}" method="post" style="display:inline;">

                                        <input type="hidden" name="id" th:value="${p.id}" />

                                        <button type="submit" class="btn btn-danger btn-sm px-3 fw-medium shadow-sm" 
                                        onclick="return confirm('¿Eliminar pregunta?')">
                                            Eliminar 
                                        </button>
                                    </form>
                                </div>

                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>
        </div>

        <div class="mt-4">
            <a th:href="@{/admin}" class="btn btn-outline-secondary px-4 fw-medium"> Volver al Panel </a>
        </div>

    </div>
    <!-- footer -->
    <footer class="bg-white border-top py-3 text-center text-muted mt-auto">
        <div class="container small">
            &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
        </div>
    </footer>
</body>
</html>
