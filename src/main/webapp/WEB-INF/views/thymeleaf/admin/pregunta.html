<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Listado de Preguntas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container my-5">

        <div class="text-center mb-4">
            <h1 class="title">Listado de Preguntas</h1>
            <div class="divider"></div>
        </div>

        <!-- BOTÓN NUEVA PREGUNTA -->
        <div class="text-end mb-3">
            <a th:href="@{/admin/mostrarCrearPregunta}" class="btn-quiz">
                + Nueva Pregunta
            </a>
        </div>
        <form th:action="@{/admin/preguntas}" method="get" class="mb-4">
            <div class="input-group">
                <input type="text"
                    name="q"
                    class="form-control"
                    placeholder="Buscar pregunta..."
                    th:value="${q}">

                <button class="btn-quiz" type="submit" style="width:auto;">
                    Buscar
                </button>
            </div>
        </form>

        <!-- TABLA -->
        <div class="quiz-card">
            <table class="table table-hover align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Pregunta</th>
                        <th>Categoría</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- vacío -->
                    <tr th:if="${#lists.isEmpty(preguntas)}">
                        <td colspan="4" class="text-center text-muted">
                            No hay preguntas registradas
                        </td>
                    </tr>
                    <!-- datos -->
                    <tr th:each="p : ${preguntas}">

                        <td th:text="${p.id}"></td>
                        <td th:text="${p.consigna}"></td>
                        <td th:text="${p.categoria}"></td>

                        <td>
                            <a th:href="@{/admin/editarPregunta(id=${p.id})}"
                               class="btn btn-sm btn-warning text-white">
                                Editar
                            </a>
                            <form th:action="@{/admin/eliminarPregunta}"
                                  method="post"
                                  style="display:inline;">

                                <input type="hidden" name="id" th:value="${p.id}"/>

                                <button class="btn btn-sm btn-danger"
                                        onclick="return confirm('¿Eliminar pregunta?')">
                                    Eliminar
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- volver -->
        <div class="mt-4">
            <a th:href="@{/admin}" class="btn-quiz">
                Volver al panel
            </a>
        </div>
    </main>

    <footer class="quiz-footer mt-4">
        <div class="container small">
            &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
        </div>
    </footer>

</body>
</html>
