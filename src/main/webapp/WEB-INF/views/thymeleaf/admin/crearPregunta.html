<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Crear Una Pregunta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"> </div>

    <div class="container mt-5 mb-5">

        <div class="mb-4 pb-2 border-bottom">
            <h1 class="text-dark fw-bold m-0">Crear Pregunta</h1>
            <p class="text-muted small mb-0">
                Añade una nueva pregunta completando todos los datos requeridos
            </p>
        </div>

        <!-- mensaje ok -->
        <div th:if="${ok}" class="alert alert-success 
        alert-dismissible fade show shadow-sm border-0 py-3" role="alert">
            <span th:text="${ok}" class="fw-semibold"> </span>
        </div>

        <!-- mensaje error -->
        <div th:if="${error}" class="alert alert-danger 
        alert-dismissible fade show shadow-sm border-0 py-3" role="alert">
            <span th:text="${error}" class="fw-semibold"> </span>
        </div>

        <div class="card shadow-sm border-0 mt-3">
            <div class="card-body p-4 p-md-5">

                <!-- formulario -->
                <form th:action="@{/admin/crearPregunta}" 
                th:object="${pregunta}" method="POST">

                    <!-- pregunta -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary"> 
                            Pregunta 
                        </label>
                        <textarea
                            name="pregunta"
                            class="form-control form-control-lg shadow-sm"
                            required
                            minlength="10"
                            rows="3"
                            placeholder="Escribe la nueva pregunta">
                        </textarea>
                    </div>

                    <hr class="text-muted my-4">

                    <!-- respuestas -->
                    <label class="form-label fw-semibold text-secondary mb-3">
                        Opciones de Respuesta
                    </label>

                    <!-- opciones -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="input-group shadow-sm">
                                <label class="input-group-text bg-success 
                                text-white fw-bold">
                                    Opción A 
                                </label>
                                <input type="text" name="a" class="form-control" 
                                placeholder="Escribe la opción A" required>
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <div class="input-group shadow-sm">
                                <label class="input-group-text bg-success 
                                text-white fw-bold">
                                    Opción B 
                                </label>
                                <input type="text" name="b" class="form-control" 
                                placeholder="Escribe la opción B" required>
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <div class="input-group shadow-sm">
                                <label class="input-group-text bg-success 
                                text-white fw-bold">
                                    Opción C 
                                </label>
                                <input type="text" name="c" class="form-control" 
                                placeholder="Escribe la opción C" required>
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-success 
                                text-white fw-bold">
                                    Opción D
                                </span>
                                <input type="text" name="d" class="form-control" 
                                placeholder="Escribe la opción D" required>
                            </div>
                        </div>
                    </div> 

                    <hr class="text-muted my-4">
                
                    <!-- correcta -->
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-secondary"> Respuesta Correcta </label>
                    
                            <select name="correcta" class="form-select shadow-sm fw-medium" required>
                                <option value="" disabled selected> Seleccionar </option>
                                <option value="A"> A </option>
                                <option value="B"> B </option>
                                <option value="C"> C </option>
                                <option value="D"> D </option>
                            </select>
                        </div>

                        <!-- categoría -->
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-secondary"> Categoría </label>

                            <select name="categoria" class="form-select shadow-sm fw-medium" required>
                                <option value="" disabled selected> Seleccionar </option>
                                <option value="Entretenimiento"> Entretenimiento </option>
                                <option value="Ciencia"> Ciencia </option>
                                <option value="Cultura"> Cultura general </option>
                                <option value="Deportes"> Deportes </option>
                            </select>
                        </div>
                    </div>
            
                    <div class="d-flex gap-2 justify-content-end pt-2">
                        <a th:href="@{/admin/pregunta}" 
                        class="btn btn-outline-secondary px-4 fw-medium">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-success px-4 fw-medium shadow-sm">
                            Guardar Pregunta
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <!-- footer -->
    <footer class="bg-white border-top py-3 text-center text-muted mt-auto">
        <div class="container small">
            &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
        </div>
    </footer>

</body>
</html>
