<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Crear Pregunta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-5">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h1 class="title">Crear Pregunta</h1>
        <div class="divider"></div>
        <p class="subtitle">Añadí una nueva pregunta al juego</p>
    </div>

    <!-- CARD -->
    <div class="quiz-card">

        <form th:action="@{/admin/crearPregunta}" method="post">

            <!-- pregunta -->
            <label class="subtitle">Pregunta</label>

            <textarea name="pregunta"
                      class="form-control mt-2"
                      rows="3"
                      placeholder="Escribí la pregunta..."
                      required>
            </textarea>

            <hr>

            <!-- opciones -->
            <label class="subtitle">Opciones</label>

            <input class="form-control mt-2 mb-2" name="a" placeholder="Opción A" required>
            <input class="form-control mb-2" name="b" placeholder="Opción B" required>
            <input class="form-control mb-2" name="c" placeholder="Opción C" required>
            <input class="form-control mb-2" name="d" placeholder="Opción D" required>

            <!-- correcta -->
            <label class="subtitle mt-3">Respuesta correcta</label>

            <select name="correcta" class="form-control mt-2" required>
                <option value="">Seleccionar</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>

            <!-- categoría -->
            <label class="subtitle mt-3">Categoría</label>

            <select name="categoria" class="form-control mt-2" required>
                <option value="">Seleccionar</option>
                <option value="Entretenimiento">Entretenimiento</option>
                <option value="Ciencia">Ciencia</option>
                <option value="Cultura">Cultura general</option>
                <option value="Deportes">Deportes</option>
            </select>

            <!-- botones -->
            <div class="d-flex gap-2 justify-content-end mt-4">

                <a th:href="@{/admin/pregunta}" class="btn-quiz" style="width:auto;">
                    Cancelar
                </a>

                <button type="submit" class="btn-quiz" style="width:auto;">
                    Guardar
                </button>

            </div>

        </form>

    </div>

</main>

<footer class="quiz-footer mt-4">
    <div class="container small">
        &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
    </div>
</footer>

</body>
</html>
