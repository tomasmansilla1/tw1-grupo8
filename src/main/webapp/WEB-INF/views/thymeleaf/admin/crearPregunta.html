<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Crear Una Pregunta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"> </div>

    <div class="container mt-4">
        <h1>Crear Pregunta</h1>

        <!-- mensaje ok -->
        <div th:if="${ok}" class="alert alert-success">
            <span th:text="${ok}"> </span>
        </div>

        <!-- mensaje error -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"> </span>
        </div>

        <!-- formulario -->
        <form th:action="@{/admin/crearPregunta}" method="post">

            <!-- pregunta -->
            <div class="mb-3">
                <label class="form-label"> Pregunta </label>
                <textarea
                    name="pregunta"
                    class="form-control"
                    required
                    minlength="10"
                    rows="3">
                </textarea>
            </div>

            <!-- respuestas -->
            <div class="mb-2">
                <label class="form-label"> Opción A </label>
                <input type="text" name="a" class="form-control" required>
            </div>

            <div class="mb-2">
                <label class="form-label"> Opción B </label>
                <input type="text" name="b" class="form-control" required>
            </div>

            <div class="mb-2">
                <label class="form-label"> Opción C </label>
                <input type="text" name="c" class="form-control" required>
            </div>

            <div class="mb-2">
                <label class="form-label"> Opción D </label>
                <input type="text" name="d" class="form-control" required>
            </div>

            <!-- correcta -->
            <div class="mb-3">
                <label class="form-label"> Respuesta Correcta </label>
                <select name="correcta" class="form-control" required>

                    <option value=""> Seleccionar </option>
                    <option value="A"> A </option>
                    <option value="B"> B </option>
                    <option value="C"> C </option>
                    <option value="D"> D </option>
                </select>
            </div>

            <!-- categoría -->
            <div class="mb-3">
                <label class="form-label"> Categoría </label>

                <select name="categoria" class="form-control" required>
                    <option value=""> Seleccionar </option>
                    <option value="Entretenimiento"> Entretenimiento </option>
                    <option value="Ciencia"> Ciencia </option>
                    <option value="Cultura"> Cultura general </option>
                    <option value="Deportes"> Deportes </option>
                </select>
            </div>

            <button type="submit" class="btn btn-success"> Guardar Pregunta </button>
        </form>
    </div>

    <!-- footer -->
    <div th:replace="~{fragments/footer :: footer}"</div>

</body>
</html>
