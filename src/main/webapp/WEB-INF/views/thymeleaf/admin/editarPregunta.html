<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Pregunta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"> </div>

    <div class="container mt-4">
        <h1> Editar Pregunta </h1>

        <!-- formulario -->
        <form th:action="@{/admin/editarPregunta}" method="post">

            <!-- id oculto -->
            <input type="hidden" name="id" th:value="${pregunta.id}">

            <!-- pregunta -->
            <div class="mb-3">
                <label class="form-label"> Pregunta </label>
                <textarea
                    name="pregunta"
                    class="form-control"
                    required
                    rows="4"
                    th:text="${pregunta.pregunta}">
                </textarea>
            </div>

            <!-- opcion A -->
            <div class="mb-2">
                <label class="form-label"> Opción A </label>
                <input
                    type="text"
                    name="a"
                    class="form-control"
                    th:value="${pregunta.a}"
                    required>
            </div>

            <!-- opcion B -->
            <div class="mb-2">
                <label class="form-label"> Opción B </label>
                <input
                    type="text"
                    name="b"
                    class="form-control"
                    th:value="${pregunta.b}"
                    required>
            </div>

            <!-- opcion C -->
            <div class="mb-2">
                <label class="form-label"> Opción C </label>
                <input
                    type="text"
                    name="c"
                    class="form-control"
                    th:value="${pregunta.c}"
                    required>
            </div>

            <!-- opcion D -->
            <div class="mb-2">
                <label class="form-label"> Opción D </label>
                <input
                    type="text"
                    name="d"
                    class="form-control"
                    th:value="${pregunta.d}"
                    required>
            </div>

            <!-- correcta -->
            <div class="mb-3">
                <label class="form-label"> Correcta </label>
                <select name="correcta" class="form-control" required>

                    <option
                        value="A"
                        th:selected="${pregunta.correcta == 'A'}">
                        A
                    </option>

                    <option
                        value="B"
                        th:selected="${pregunta.correcta == 'B'}">
                        B
                    </option>

                    <option
                        value="C"
                        th:selected="${pregunta.correcta == 'C'}">
                        C
                    </option>

                    <option
                        value="D"
                        th:selected="${pregunta.correcta == 'D'}">
                        D
                    </option>
                </select>
            </div>

            <!-- categoria -->
            <div class="mb-3">
                <label class="form-label"> Categoría </label>
                <input
                    type="text"
                    name="categoria"
                    class="form-control"
                    th:value="${pregunta.categoria}"
                    required>
            </div>

            <button type="submit" class="btn btn-primary"> Actualizar </button>
        </form>
    </div>

    <!-- footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
