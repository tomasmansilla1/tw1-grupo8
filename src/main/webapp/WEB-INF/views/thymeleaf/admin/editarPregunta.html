<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Pregunta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"> </div>

    <div class="container mt-5 mb-5">
        
        <div class="mb-4 pb-2 border-bottom">
            <h1 class="text-dark fw-bold m-0">Editar Pregunta</h1>
            <p class="text-muted small mb-0">Modifica la pregunta, las opciones o la respuesta correcta</p>
        </div>

        <!-- formulario -->
         <div class="card shadow-sm border-0 mt-3">
            <div class="card-body p-4 p-md-5">

                <form th:action="@{/admin/editarPregunta}" method="post">

                <!-- id oculto -->
                <input type="hidden" name="id" th:value="${pregunta.id}">

                <!-- pregunta -->
                <div class="mb-4">
                    <label class="form-label fw-semibold text-secondary"> Pregunta </label>
                    <textarea
                        name="pregunta"
                        class="form-control form-control-lg shadow-sm"
                        required
                        rows="3"
                        placeholder="Escribe la pregunta, ejemplo: ¿Quien es la reyna de Inglaterra?"
                        th:text="${pregunta.pregunta}">
                    </textarea>
                </div>

                <hr class="text-muted my-4">

                <!-- opciones -->
                <label class="form-label fw-semibold text-secondary mb-3">Opciones de Respuesta</label>
                <div class="row">

                    <!-- opcion A -->
                    <div class="col-md-6 mb-3">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-primary text-white fw-bold">
                                Opcion A
                            </span>
                            <input
                                type="text"
                                name="a"
                                class="form-control"
                                th:value="${pregunta.a}"
                                placeholder="Escribe la opción A"
                                required>
                        </div>
                    </div>

                    <!-- opcion B -->
                    <div class="col-md-6 mb-3">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-primary text-white fw-bold">
                                Opcion B
                            </span>
                            <input
                                type="text"
                                name="b"
                                class="form-control"
                                th:value="${pregunta.b}"
                                placeholder="Escribe la opción B"
                                required>
                        </div>
                    </div>

                    <!-- opcion C -->
                    <div class="col-md-6 mb-3">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-primary text-white fw-bold"> 
                                Opcion C
                            </span>
                            <input
                                type="text"
                                name="c"
                                class="form-control"
                                th:value="${pregunta.c}"
                                placeholder="Escribe la opción C"
                                required>
                        </div>
                    </div>

                    <!-- opcion D -->
                    <div class="col-md-6 mb-3">
                        <div class="input-group shadow-sm"> 
                            <span class="input-group-text bg-primary text-white fw-bold">
                            Opcion D
                            </span>
                            <input
                                type="text"
                                name="d"
                                class="form-control"
                                th:value="${pregunta.d}"
                                placeholder="Escribe la opción D"
                                required>
                        </div>
                    </div>
                </div>

                <hr class="text-muted my-4">

                <!-- Opcion correcta -->
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label fw-semibold text-secondary">Opción Correcta</label>
                        <select name="correcta" class="form-select shadow-sm fw-medium" required>
                                
                            <option value="" disabled selected> Seleccionar </option>

                            <!-- opcion A -->
                            <option value="A" 
                            th:selected="${pregunta.correcta == 'A'}">
                                Opción A
                            </option>

                            <!-- opcion B -->
                            <option value="B" 
                            th:selected="${pregunta.correcta == 'B'}">
                            Opción B
                            </option>
                            
                            <!-- opcion C -->
                            <option value="C" 
                            th:selected="${pregunta.correcta == 'C'}">
                            Opción C
                            </option>
                            
                            <!-- opcion D -->
                            <option value="D" 
                            th:selected="${pregunta.correcta == 'D'}">
                            Opción D
                            </option>
                        </select>
                    </div>

                    <!-- categoria -->
                    <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-secondary"> Categoría </label>

                            <select name="categoria" class="form-select shadow-sm fw-medium" required>
                                <option value="" disabled selected> Seleccionar </option>
                                <option value="Entretenimiento"> Entretenimiento </option>
                                <option value="Ciencia"> Ciencia </option>
                                <option value="Cultura"> Cultura general </option>
                                <option value="Deportes"> Deportes </option>
                            </select>
                        </div>
                </div>

            <!-- Botones -->
            <div class="d-flex gap-2 justify-content-end pt-2">
                <a th:href="@{/admin/pregunta}" 
                class="btn btn-outline-secondary px-4 fw-medium">
                    Cancelar
                </a>
                <button type="submit" class="btn btn-primary px-4 fw-medium shadow-sm">
                    Guardar Cambios
                </button>
            </div>

        </form>
    </div>

    <!-- footer -->
    <footer class="bg-white border-top py-3 text-center text-muted mt-auto">
        <div class="container small">
            &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
        </div>
    </footer>

</body>
</html>
