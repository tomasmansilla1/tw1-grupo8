<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Pregunta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-5">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h1 class="title">Editar Pregunta</h1>
        <div class="divider"></div>
        <p class="subtitle">Modificá los datos de la pregunta</p>
    </div>

    <!-- CARD -->
    <div class="quiz-card">

        <form th:action="@{/admin/editarPregunta}" method="post">

            <input type="hidden" name="id" th:value="${pregunta.id}">

            <!-- pregunta -->
            <label class="subtitle">Pregunta</label>
            <textarea id="inputPregunta"
                      name="pregunta"
                      class="form-control mt-2"
                      rows="3"
                      required
                      th:text="${pregunta.pregunta}">
            </textarea>

            <hr>

            <!-- opciones -->
            <div class="row">

                <div class="col-md-6 mb-3">
                    <input class="form-control"
                           name="a"
                           th:value="${pregunta.a}"
                           placeholder="Opción A">
                </div>

                <div class="col-md-6 mb-3">
                    <input class="form-control"
                           name="b"
                           th:value="${pregunta.b}"
                           placeholder="Opción B">
                </div>

                <div class="col-md-6 mb-3">
                    <input class="form-control"
                           name="c"
                           th:value="${pregunta.c}"
                           placeholder="Opción C">
                </div>

                <div class="col-md-6 mb-3">
                    <input class="form-control"
                           name="d"
                           th:value="${pregunta.d}"
                           placeholder="Opción D">
                </div>

            </div>

            <!-- correcta -->
            <label class="subtitle mt-3">Respuesta correcta</label>

            <select name="correcta" class="form-control mt-2">

                <option value="A" th:selected="${pregunta.correcta == 'A'}">A</option>
                <option value="B" th:selected="${pregunta.correcta == 'B'}">B</option>
                <option value="C" th:selected="${pregunta.correcta == 'C'}">C</option>
                <option value="D" th:selected="${pregunta.correcta == 'D'}">D</option>

            </select>

            <!-- categoría -->
            <label class="subtitle mt-3">Categoría</label>

            <select name="categoria" class="form-control mt-2">

                <option value="Entretenimiento"
                        th:selected="${pregunta.categoria == 'Entretenimiento'}">
                    Entretenimiento
                </option>

                <option value="Ciencia"
                        th:selected="${pregunta.categoria == 'Ciencia'}">
                    Ciencia
                </option>

                <option value="Cultura"
                        th:selected="${pregunta.categoria == 'Cultura'}">
                    Cultura
                </option>

                <option value="Deportes"
                        th:selected="${pregunta.categoria == 'Deportes'}">
                    Deportes
                </option>

            </select>

            <!-- botones -->
            <div class="d-flex gap-2 justify-content-end mt-4">

                <a th:href="@{/admin/pregunta}" class="btn-quiz" style="width:auto;">
                    Cancelar
                </a>

                <button type="submit" class="btn-quiz" style="width:auto;">
                    Guardar
                </button>

            </div>

        </form> 
    </div>

</main>

<footer class="quiz-footer mt-4">
    <div class="container small">
        &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
    </div>
</footer>

</body>
</html>
