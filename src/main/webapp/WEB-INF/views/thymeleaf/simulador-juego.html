<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Simulador Juego</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">

<style>
body {
    background: linear-gradient(-45deg, #FFE3EA, #A9D9FF, #D5F4E6, #FFF1B8);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    font-family: Arial;
    padding: 40px 15px;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* CARD PRINCIPAL */
.card-game {
    max-width: 750px;
    margin: auto;
    margin-top: 40px;
    padding: 45px;
    border-radius: 30px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    box-shadow:
        0 15px 40px rgba(0,0,0,.15),
        0 0 25px rgba(77,163,217,.15);
}

/* TÍTULO */
h2 {
    margin-bottom: 25px;
}

.game-title {
    font-size: 2.5rem;
    font-weight: bold;
    margin-bottom: 10px;
}

.game-subtitle {
    color: #666;
    margin-bottom: 30px;
}

/* CATEGORÍA */
.badge-cat {
    background: #4DA3D9;
    padding: 10px 18px;
    border-radius: 25px;
    color: white;
    display: inline-block;
    margin-bottom: 25px;
}

/* PREGUNTA */
#pregunta {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 25px;
}

/* OPCIONES */
.option-btn {
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    border-radius: 15px;
    transition: all .25s ease;
}

.option-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 15px rgba(0,0,0,.15);
}

/* PUNTAJE */
#puntaje {
    font-size: 22px;
    font-weight: bold;
}

/* FEEDBACK */
#feedback {
    margin-top: 15px;
    font-weight: bold;
    min-height: 20px;
}

/* BOTÓN FINAL */
.btn-start {
    display: inline-block;
    padding: 15px 35px;
    border-radius: 50px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    font-size: 1.1rem;

    background: linear-gradient(135deg,#4DA3D9,#7B61FF);

    box-shadow: 0 10px 25px rgba(123,97,255,.35);

    transition: all .3s ease;
}

.btn-start:hover {
    transform: translateY(-4px) scale(1.03);
    color: white;
    box-shadow: 0 15px 35px rgba(123,97,255,.5);
}
</style>

</head>

<body>

    <div class="card-game text-center">
        <h2 class="text-primary">Trivia Simulator</h2>
        <p class="game-subtitle">
            Probá una partida antes de entrar al desafío real.
        </p>    

        <div class="mb-3">
            <span class="badge-cat" id="categoria">Categoría: Cultura general</span>
        </div>

        <div id="pregunta"></div>
        <div id="opciones"></div>

        <h4>Puntaje: <span id="puntaje">0</span></h4>

        <div id="feedback"></div>

        <button onclick="reiniciar()">Reiniciar</button>
    </div>

    <script>

        const juego = [
            {
                pregunta: "¿Quién es la persona más inteligente, guapa y carismática del mundo?",
                opciones: [
                    "El alumno que se sienta al fondo",
                    "La IA que generó estas preguntas",
                    "El perro del vecino",
                    "El admin"
                ],
                correcta: "El admin"
            },
            {
                pregunta: "Según la ley universal y el sentido común, ¿quién tiene siempre la razón?",
                opciones: ["El admin", "La persona que grita más fuerte", "Internet", "Pichu"],
                correcta: "El admin"
            },
            {
                pregunta: "En caso de invasión alienígena, ¿qué deberíamos ofrecerles como prueba de superioridad humana?",
                opciones: [
                    "Nada, nos extinguamos con estilo",
                    "Nuestras armas nucleares",
                    "Un examen de matemáticas sin resolver",
                    "Una foto del admin"
                ],
                correcta: "Nada, nos extinguamos con estilo"
            },
            {
                pregunta: "Según la teoría de la relatividad general, ¿qué pesa más?",
                opciones: ["Un kilo de plomo", "Un kilo de plumas", "Un gato gordo", "Tu mochila llena de libros sin usar"],
                correcta: "Un gato gordo"
            },
            {
                pregunta: "¿Qué pasaría si el admin estornudara con los ojos abiertos?",
                opciones: [
                    "El universo colapsaría",
                    "Saldría un arcoíris de conocimiento",
                    "Nada, porque es biológicamente perfecto/a en todo aspecto",
                    "Se le caerían las gafas"
                ],
                correcta: "El universo colapsaría"
            },
            {
                pregunta: "¿Quién pintó realmente la Mona Lisa?",
                opciones: ["Leonardo da Vinci", "Un alienígena", "El admin en una vida pasada", "La Mona Lisa se pintó sola"],
                correcta: "Leonardo da Vinci"
            }
        ];

        let index = 0;
        let puntaje = 0;

        function mostrarPregunta() {
            const preguntaEl = document.getElementById("pregunta");
            const opcionesEl = document.getElementById("opciones");
            const feedbackEl = document.getElementById("feedback");

            feedbackEl.innerText = "";

            if (index >= juego.length) {
                preguntaEl.innerText = "🏁 Juego terminado!";
                opcionesEl.innerHTML = `<h3>Tu puntaje final: ${puntaje}</h3>`;
                return;
            }

            const actual = juego[index];

            preguntaEl.innerText = actual.pregunta;

            opcionesEl.innerHTML = "";

            actual.opciones.forEach(op => {
                const btn = document.createElement("button");
                btn.innerText = op;
                btn.className = "btn btn-outline-primary option-btn";

                btn.addEventListener("click", () => responder(op));

                opcionesEl.appendChild(btn);
            });
        }

        function responder(opcion) {
            const correcta = juego[index].correcta;
            const feedbackEl = document.getElementById("feedback");

            if (opcion === correcta) {
                puntaje += 10;
                feedbackEl.innerText = "✔ Correcto!";
                feedbackEl.style.color = "green";
            } else {
                feedbackEl.innerText = "❌ Incorrecto!";
                feedbackEl.style.color = "red";
            }

            document.getElementById("puntaje").innerText = puntaje;

            index++;

            setTimeout(() => {
                mostrarPregunta();
            }, 600);
        }

        function reiniciar() {
            index = 0;
            puntaje = 0;
            document.getElementById("puntaje").innerText = 0;
            mostrarPregunta();
        }

        mostrarPregunta();

    </script>

<div class="mt-5">
    <a th:href="@{/buscar-juego}" class="btn-start">
        Ir al juego real
    </a>
</div>

</body>
</html>
