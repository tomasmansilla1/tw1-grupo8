<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Registro</title>

    <!-- Boostrap core css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body class="m-0 p-0">
<nav class="navbar navbar-expand-lg bg-primary px-3">
    <a class="navbar-brand text-white" href="/spring/">
        Home
    </a>
</nav>

<h1 class="text-center mb-4 text-primary mt-5">
    Registro de Usuario
</h1>

<form th:action="@{/registro}" method="post" th:object="${datosFormulario}" class="container mt-5 w-50">

    <div class="mb-3">
        <input
                type="email"
                name="email"
                id="email"
                class="form-control"
                placeholder="Email" required>
    </div>

    <div class="mb-3">
        <input
                type="text"
                name="username"
                id="username"
                class="form-control"
                placeholder="Username" required>
    </div>

    <div class="mb-3">
        <input
                type="password"
                name="password"
                id="password"
                class="form-control"
                placeholder="Password" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">
        Enviar
    </button>
</form>

<div th:if="${error}" class="alert alert-danger mt-5">
    <span th:text="${error}"></span>
</div>
</body>
</html>
