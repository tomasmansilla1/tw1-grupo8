<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Taller Web I</title>

  <!-- Boostrap core css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

  <!-- custom style -->
  <link rel="stylesheet" th:href="@{/css/main.css}" />

</head>

<body class="bg-light d-flex flex-column min-vh-100">

  <div th:replace="~{fragments/navbar :: navbar}"> </div>

  <main role="main" class="container d-flex flex-grow-1 align-items-center justify-content-center my-5">
    <div class="col-md-8 col-lg-6 text-center">
      <div class="card shadow border-0 p-4 p-md-5 bg-white rounded-4">

        <div class="card-body">
          <h1 class="text-dark fw-extrabold mb-2 fs-2">Bienvenidos a Taller Web I</h1>
          <p class="text-muted mb-4">Plataforma de Juego de preguntas para la materia.</p>
                    
          <hr class="text-muted my-4">

          <a th:href="@{/login}" class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow-sm rounded-3">
            Ingresar
          </a>
        </div>

      </div>
    </div>
  </main>
  
  <footer class="bg-white border-top py-3 text-center text-muted mt-auto">
    <div class="container small">
      &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
    </div>
  </footer>

  <!-- Boostrap core js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
  crossorigin="anonymous"></script>

</body>

</html>
