<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Inicio - Trivia Game</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-5">

    <div class="row g-4 justify-content-center">

        <!-- PANEL PRINCIPAL -->
        <div class="col-lg-7">

            <div class="quiz-card text-center h-100">

                <h1 class="title">
                    Bienvenido
                    <span th:if="${session.usuario != null}"
                          th:text="${session.usuario.username}">
                    </span>
                </h1>

                <div class="divider"></div>

                <p class="subtitle">
                    Elegí una opción para continuar
                </p>

                <div class="d-grid gap-3 mt-4">

                    <a th:href="@{/buscar-juego}" class="btn-quiz">
                        Jugar
                    </a>

                    <a th:href="@{/tutorial}" class="btn-quiz">
                        Cómo jugar
                    </a>

                    <a th:href="@{/como-jugar}" class="btn-quiz">
                        Simulador
                    </a>

                    <a th:href="@{/usuario/historial}" class="btn-quiz">
                        Historial
                    </a>

                    <a th:href="@{/ranking}" class="btn-quiz">
                        Ranking completo
                    </a>

                    <a th:if="${session.usuario != null and session.usuario.rol == 'ADMIN'}"
                       th:href="@{/admin}"
                       class="btn-quiz">
                        Panel Admin
                    </a>

                </div>

            </div>

        </div>

        <!-- MINI RANKING -->
        <div class="col-lg-4">

            <div class="quiz-card h-100">

                <h3 class="title text-center">
                    Top Jugadores
                </h3>

                <div class="divider"></div>

                <div th:if="${#lists.isEmpty(ranking)}"
                     class="text-center text-muted">
                    No hay datos disponibles
                </div>

                <div th:unless="${#lists.isEmpty(ranking)}">

                    <table class="table align-middle">

                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Usuario</th>
                            <th>Puntos</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="item, stat : ${ranking}"
                            th:if="${stat.index < 5}">

                            <td>
                                <strong th:text="${stat.index + 1}"></strong>
                            </td>

                            <td th:text="${item.usuario.username}">
                                Usuario
                            </td>

                            <td th:text="${item.puntaje}">
                                0
                            </td>

                        </tr>

                        </tbody>

                    </table>

                    <div class="text-center mt-3">
                        <a th:href="@{/ranking}"
                           class="btn-link-game">
                            Ver ranking completo
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

<footer class="quiz-footer mt-4">
    <div class="container small">
        &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
    </div>
</footer>

</body>
</html>
