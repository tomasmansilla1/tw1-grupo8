<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Inicio - Trivia Game</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container my-5">

  <div class="quiz-card text-center">

    <h1 class="title">
      Bienvenido
      <span th:text="${session.usuario.username}">
        Usuario
      </span>
    </h1>

    <div class="divider"></div>

      <p class="subtitle">
        Elegí una opción para continuar
      </p>

      <div class="d-grid gap-3 mt-4">

        <a th:href="@{/buscar-juego}" class="btn-quiz">
          Jugar
        </a>

        <a th:href="@{/ranking}" class="btn-quiz">
          Ranking
        </a>

        <a th:href="@{/usuario/historial}" class="btn-quiz">
          Historial
        </a>

        <a th:if="${session.usuario.rol == 'ADMIN'}" th:href="@{/admin}" class="btn-quiz">
          Panel Admin
        </a>
      </div>
    </div>
  </div>

</main>

<footer class="quiz-footer mt-4">
  <div class="container small">
    &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
  </div>
</footer>

</body>
</html>
