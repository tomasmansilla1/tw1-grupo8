<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Taller Web I</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS base del juego -->
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body d-flex justify-content-center align-items-center">

  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <main class="container d-flex flex-grow-1 align-items-center justify-content-center my-5">

    <div class="quiz-card text-center">

      <h1 class="title">
        Bienvenidos a Taller Web I
      </h1>

      <div class="divider"></div>

      <p class="subtitle">
        Bienvenido al juego de preguntas.<br>
        Iniciá sesión o registrate para comenzar a jugar.
      </p>

      <!-- Botón login -->
      <a th:href="@{/login}" class="btn-quiz mb-3">
        Iniciar sesión
      </a>

      <!-- Botón registro -->
      <a th:href="@{/registro}" class="btn-quiz">
        Registrarse
      </a>

    </div>

  </main>

  <footer class="quiz-footer mt-4">
    <div class="container small">
      &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
    </div>
  </footer>

</body>
</html>
