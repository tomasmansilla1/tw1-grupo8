<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Ranking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/ranking.css}">
</head>

<body class="home-body">

  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <div class="container mt-5">

    <div class="quiz-card text-center mx-auto" style="max-width: 900px;">

      <h1 class="ranking-title">Ranking Global</h1>

      <div class="divider"></div>

        <p class="ranking-subtitle">
          Los mejores jugadores de la plataforma
        </p>

        <div class="table-responsive">

          <table class="table table-borderless table-custom align-middle">

            <thead>
              <tr>
                <th onclick="sortTable(0)">Posición ↕</th>
                <th onclick="sortTable(1)">Usuario ↕</th>
                <th onclick="sortTable(2)">Puntaje ↕</th>
              </tr>
            </thead>

            <tbody>

             <tr th:each="item, stat : ${ranking}"
              th:classappend="${
              stat.index == 0 ? 'first-place' :
              stat.index == 1 ? 'second-place' :
              stat.index == 2 ? 'third-place' : ''
              }">
                <td class="fw-bold" th:text="${stat.index + 1}"></td>
                <td class="fw-semibold" th:text="${item.usuario.username}"></td>
                <td class="fw-bold text-primary"th:text="${item.puntaje}"> </td>
              </tr>
            </tbody>

          </table>

        </div>

        <div th:if="${#lists.isEmpty(ranking)}" class="mt-3 text-muted">
          No hay partidas registradas todavía.
        </div>

        <a th:href="@{/home}" class="btn-quiz mt-4">
          Volver al inicio
        </a>

      </div>

    </div>

  <footer class="quiz-footer mt-5">
    <div class="container small" style="color: #6c757d">
      &copy; 2026 - Taller Web I - Universidad Nacional de La Matanza
    </div>
  </footer>

<script>
function sortTable(n) {

  let table = document.querySelector(".table-custom");
  let rows, switching, i, x, y, shouldSwitch;
  let dir = "asc";
  let switchcount = 0;

  switching = true;

  while (switching) {

    switching = false;
    rows = table.rows;

    for (i = 1; i < rows.length - 1; i++) {

      shouldSwitch = false;

      x = rows[i].getElementsByTagName("TD")[n];
      y = rows[i + 1].getElementsByTagName("TD")[n];

      let xContent = isNaN(x.innerText)
      ? x.innerText.toLowerCase()
      : parseFloat(x.innerText);

      let yContent = isNaN(y.innerText)
      ? y.innerText.toLowerCase()
      : parseFloat(y.innerText);

      if (dir === "asc") {
        if (xContent > yContent) {
          shouldSwitch = true;
          break;
          }
        } else {

        if (xContent < yContent) {
          shouldSwitch = true;
          break;
        }
      }
    }

    if (shouldSwitch) {
      rows[i].parentNode.insertBefore(rows[i + 1],rows[i]);

      switching = true;
      switchcount++;

    } else {
      if (switchcount === 0 && dir === "asc") {
        dir = "desc";
        switching = true;
      }
    }
  }
}
</script>

</body>

</html>
