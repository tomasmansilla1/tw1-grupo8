<head>
    <meta charset="UTF-8">
    <title>Ranking</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/ranking.css}">
</head>

<body class="home-body">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5">
        <div class="quiz-card text-center mx-auto">

            <h1 class="title">Ranking</h1>

            <div class="divider"></div>
            <p class="subtitle">Mejores jugadores</p>

            <!-- tabla -->
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Posición</th>
                        <th>Usuario</th>
                        <th>Puntaje</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="item, stat : ${ranking}">
                        <td th:text="${stat.index + 1}"></td>
                        <td th:text="${item.usuario.username}"></td>
                        <td th:text="${item.puntaje}"></td>
                    </tr>
                </tbody>
            </table>
            <!-- Si no hay ranking -->
            <div th:if="${#lists.isEmpty(ranking)}" class="mt-3 text-muted">
                No hay partidas registradas todavía.
            </div>
        </div>

        <!-- Botón volver -->
        <a th:href="@{/home}" class="btn-quiz mt-3">Volver al inicio</a>
    </div>

    <footer class="quiz-footer mt-4">
        <div class="container small">
            &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
        </div>
    </footer>

</body>
</html>
