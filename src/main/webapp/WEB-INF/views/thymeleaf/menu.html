<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menú - Trivia Game</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- CSS-->
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="home-body">
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <main class="container d-flex justify-content-center align-items-center my-5">
    <div class="quiz-card text-center">

      <h1 class="title">Menú del Juego</h1>

      <div class="divider"></div>

        <p class="subtitle">
            Bienvenido 
            <b th:text="${usuario?.username}">Jugador</b>
            <br>
            Elegí una opción para continuar
        </p>

        <!-- BOTONES -->
        <a th:href="@{/juego}" class="btn-quiz"> Jugar </a>
        <a th:href="@{/ranking}" class="btn-quiz"> Ranking </a>
        <a th:href="@{/logout}" class="btn-quiz"> Cerrar Sesion </a>

    </div>

  </main>

    <!-- Footer -->
    <footer class="quiz-footer mt-4">
        <div class="container small">
            &copy; 2026 - Taller Web I - Universidad Nacional de la Matanza
        </div>
    </footer>

</body>
</html>
