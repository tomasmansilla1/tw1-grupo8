<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Categoría - Trivia</title>
    <style>
        /* Reset básico y tipografía */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fondo degradado idéntico al login */
        body {
            background: linear-gradient(135deg, #cbd3da 0%, #a1b4c4 50%, #8ca4b9 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tarjeta central (Card) */
        .card {
            background-color: rgba(220, 224, 227, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* Título principal */
        .card h1 {
            color: #3b7da3;
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-weight: bold;
            position: relative;
            display: inline-block;
        }

        /* Subrayado coqueto del título */
        .card h1::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: #c07a8a;
            margin: 8px auto 0 auto;
            border-radius: 2px;
        }

        /* Texto de instrucción */
        .card p {
            color: #556775;
            font-size: 1rem;
            margin-top: 15px;
            margin-bottom: 25px;
        }

        /* Estilizado del formulario contenedor */
        .game-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Estilo para el Select (Dropdown) personalizado */
        .select-wrapper {
            position: relative;
            width: 100%;
        }

        .custom-select {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            color: #4a5560;
            background-color: rgba(255, 255, 255, 0.4);
            border: 1.5px solid #a3b3c2;
            border-radius: 10px;
            outline: none;
            appearance: none; /* Remueve la flecha por defecto del navegador */
            -webkit-appearance: none;
            -moz-appearance: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .custom-select:focus {
            border-color: #3b7da3;
            background-color: #ffffff;
            box-shadow: 0 0 8px rgba(59, 125, 163, 0.2);
        }

        /* Flechita personalizada para el select */
        .select-wrapper::after {
            content: '▼';
            font-size: 0.8rem;
            color: #3b7da3;
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Botón Jugar (Mismo color rosa/comidita del botón 'Entrar') */
        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            background-color: #be7b8a;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(190, 123, 138, 0.2);
        }

        .btn-submit:hover {
            background-color: #ad6b79;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Categoría</h1>
    <p>¡Elegí tu temática para empezar la aventura!</p>

    <form th:action="@{/juego}" method="post" th:object="${preguntaDto}" class="game-form">

        <div class="select-wrapper">
            <select th:field="*{categoria}" class="custom-select">
                <option th:value="HISTORIA">📜 Historia</option>
                <option th:value="ARTE">🎨 Arte</option>
                <option th:value="DEPORTE">⚽ Deporte</option>
            </select>
        </div>

        <button type="submit" class="btn-submit">Jugar</button>
    </form>
</div>

</body>
</html>
