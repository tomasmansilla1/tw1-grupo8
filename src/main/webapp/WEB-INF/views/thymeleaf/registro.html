<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- CSS base -->
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <!-- CSS sesión -->
  <link rel="stylesheet" th:href="@{/css/sesion.css}" />
</head>

<body class="home-body d-flex justify-content-center align-items-center">
  <div class="quiz-card text-center">

    <h1 class="title">Registro</h1>

    <div class="divider"></div>

    <p class="subtitle">
      Creá tu cuenta para empezar a jugar
    </p>

    <form th:action="@{/registrarme}" method="POST" th:object="${usuario}">

      <input th:field="*{email}"
             type="email"
             class="form-control input-game"
             placeholder="Email"
             required>

      <input th:field="*{password}"
             type="password"
             class="form-control input-game mt-3"
             placeholder="Contraseña"
             required>

      <button class="btn-quiz mt-4">
        Registrarme
      </button>

    </form>

    <!-- error -->
    <div th:if="${error}" class="alert alert-danger mt-3">
      <span th:text="${error}"></span>
    </div>

    <a th:href="@{/login}" class="btn-link-game mt-3">
      Ya tengo cuenta
    </a>

  </div>

</body>
</html>
